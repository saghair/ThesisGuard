services:
  - type: web
    name: thesis-guard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: SAPLING_API_KEY
        sync: false
      - key: APP_BASE_URL
        value: https://thesisguard.onrender.com
